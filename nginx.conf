user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile           on;
    keepalive_timeout  65;

    # Block any Host header not matched by a campaign server block.
    # Prevents accidental exposure of the Python server via nginx on port 80.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # PHP enrollment front-end — port 8080
    # /poll and /search are proxied to the Python backend so the browser
    # never needs to make a cross-origin request (no CORS required).
    server {
        listen 8080;
        root  /var/www/php-enrollment;
        index index.php;

        # Proxy victim-polling and post-auth redirect back to Python
        location ~ ^/(poll|search) {
            proxy_pass         http://127.0.0.1:3000;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # PHP-FPM passthrough
        location ~ \.php$ {
            try_files      $uri =404;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }

    # Per-campaign reverse-proxy blocks are written here by DemoTokens
    # (nginx_helper.py → /etc/nginx/conf.d/demotokens.conf)
    include /etc/nginx/conf.d/*.conf;
}
